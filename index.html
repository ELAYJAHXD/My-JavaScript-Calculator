<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Links your app.js file -->
    <script src="app.js" defer></script>
    
    <style>
     
        body {
            background-color: #121212 !important;
            color: #f8f9fa;
        }

        .card-dark {
            background-color: #1a1a1a !important;
            border: 1px solid #2d2d2d !important;
        }

     
        .text-mustard {
            color: #E5A93C !important;
        }
        
        .text-muted-custom {
            color: #a0a0a0 !important;
        }

    
        .btn-mustard {
            background-color: #E5A93C !important;
            color: #121212 !important;
            border: none;
        }

        .btn-mustard:hover {
            background-color: #cb922f !important;
            color: #121212 !important;
        }

       
        .btn-clear-custom {
            background-color: transparent !important;
            color: #E5A93C !important;
            border: 2px solid #E5A93C !important;
        }

        .btn-clear-custom:hover {
            background-color: #E5A93C !important;
            color: #121212 !important;
        }

       
        .form-control-dark {
            background-color: #262626 !important;
            border: 1px solid #444444 !important;
            color: #ffffff !important;
        }

        .form-control-dark:focus {
            background-color: #2d2d2d !important;
            color: #ffffff !important;
            border-color: #E5A93C !important;
            box-shadow: 0 0 0 0.25rem rgba(229, 169, 60, 0.25) !important;
        }

        .form-control-dark::placeholder {
            color: #6c757d !important;
        }


        .output-box {
            background-color: #222222 !important;
            border: 1px solid #333333 !important;
        }


        .hover-card {
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        box-shadow 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .hover-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 1rem 3rem rgba(229, 169, 60, 0.1) !important;
        }

        .btn-calc {
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-calc:hover {
            transform: translateY(-2px);
        }

        .btn-calc:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="vh-100 d-flex flex-column justify-content-center align-items-center">

    <div class="card p-4 shadow hover-card card-dark" style="width: 320px;">
        <h3 class="card-title text-center mb-1 fw-bold text-mustard">Simple Calculator</h3>
        <p class="text-muted-custom text-center small mb-4">Perform Basic Arithmetic Operations</p>

        <div class="mb-3">
            <label for="num1" class="form-label fw-semibold text-muted-custom">First Number:</label>
            <input type="text" id="num1" class="form-control form-control-dark" placeholder="Enter first number">
        </div>

        <div class="mb-4">
            <label for="num2" class="form-label fw-semibold text-muted-custom">Second Number:</label>
            <input type="text" id="num2" class="form-control form-control-dark" placeholder="Enter second number">
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <button id="addBtn" class="btn btn-mustard btn-calc w-100 mb-2 fw-bold">+</button>
                <button id="subBtn" class="btn btn-mustard btn-calc w-100 fw-bold">-</button>
            </div>
            <div class="col-6">
                <button id="mulBtn" class="btn btn-mustard btn-calc w-100 mb-2 fw-bold">×</button>
                <button id="divBtn" class="btn btn-mustard btn-calc w-100 fw-bold">÷</button>
            </div>
        </div>

        <div>
            <button id="clearBtn" class="btn btn-clear-custom btn-calc w-100 mb-4 fw-bold">
                Clear
            </button>
        </div>

        <div class="p-3 rounded text-center output-box" id="resultText">
            <p class="text-muted-custom m-0 small">Awaiting calculation...</p>
        </div>
    </div>
    

</body>
</html>
